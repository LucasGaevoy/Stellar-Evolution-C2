<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stellar Evolution</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    .info .val{
      display: inline-block;
      min-width: 140px;   /* tweak: 120–180 depending on your taste */
    }

    .info {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 10px;
      font-family: sans-serif;
    }

    body{
      margin: 0;
      padding: 0;
      background: #f4f6f8;
      text-align: center;
    }

    .format{
      max-width: 1200px;
      margin: 40px auto;
      padding: 20px;
    }

    .title{
      text-align: center;
      margin: 0 0 30px 0;
      font-weight: 600;
    }

    h3{
      text-align: center;
      color: #000000;
      font-weight: bold;
      margin-top: 7px;
      margin-bottom: 5px;
    }

    .container{
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-top: 20px;
    }

    .panel{
      background-color: #e8f0f8;
      border-radius: 12px;
      padding: 15px;
      height: 540px;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.1);
    }

    #star-view{
      position: relative;
      text-align: left;
      display: flex;
      flex-direction: column;
      padding: 15px;
      flex: 3;
      min-width: 350px;
    }

    .info { flex: 0 0 auto; }

    #scene { flex: 1 1 auto; min-height: 320px;}
    
    .mass-box{
      position: absolute;
      top: 15px;
      right: 15px;
      width: auto;
    }

    .time-box{
      margin-top: auto;
      display: flex;
      gap: 10px;
      margin-top: auto;
    }

    .time-label {
      font-size: 14px;
      font-family: sans-serif;
      white-space: nowrap;
    }

    .label-3DSlider {
      font-size: 14px;
      font-family: sans-serif;
      margin-left: 40px;
      margin-top: 10px;
      margin-bottom: 10px;
    }

    .TimeSlider .Sliderfor3D {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      height: 20px;
      background: #d3d3d3;
      outline: none;
      opacity: 0.7;
      pointer-events: none; 
      cursor: default;
    }

    .TimeSlider .Sliderfor3D::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      background: #759ec0;
      cursor: default; 
    }

    .TimeSlider .Sliderfor3D::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #759ec0;
      cursor: default;
    }

    #hr-diagram{
      flex: 2;
      height: 540px;
      min-width:350px;
    }
  </style>
</head>

<body>

<div class="format">

  <h1 class="title">Stellar Evolution</h1> 

  <div class="container">
    
    <div id="star-view" class="panel">
      
      <div class="info">
        Hydrogen Percentage: <span id="hPct">—</span><br>
        Helium Percentage: <span id="hePct">—</span><br>
        Evolutionary Stage: <span id="stage">—</span><br>
        Age: <span id="age">—</span><br>
      </div>
      <div id="scene" style="width:100%; height:320px; border-radius:10px; overflow:hidden;"></div>

      <div class="mass-box">
        <div style="display:flex; align-items:center; gap:5px; margin-bottom:5px;">
          <label>Mass:</label>
          <select id="MassValues" style="width:120px;">
            <option value="0.1">0.1</option>
            <option value="0.5">0.5</option>
            <option value="1">1</option>
            <option value="3">3</option>
            <option value="10">10</option>
            <option value="100">100</option>
          </select>
          M<sub>&odot;</sub>
        </div>
      </div>

      <div style="display:flex; align-items: center; gap: 10px;">
        <span class="label-3DSlider">
              3D Animation zoom: <span id="zoomPct">50</span>%
        </span>
        <input type="range" id="3D-zoom" min="0" max="100" value="50" class="Sliderfor3D" style="flex:1;">
      </div>

      <div class="time-box" style="display:flex; flex-direction: column; gap: 10px; margin-top: auto;">
        <div style="display:flex; align-items: center; gap: 10px;">
          <button class="PlayButton" id="play-pre" data-index="1" type="button">&#9654;</button>
          <span class="time-label">
            Before main sequence: <span class="TimeDemo" id="pct-pre">0</span>%
          </span>
          <input type="range" id="time-pre" min="0" max="100" value="0" class="TimeSlider" style="flex:1;">
      </div>

        <div style="display:flex; align-items: center; gap: 10px;">
          <button class="PlayButton" id="play-ms" data-index="2" type="button">&#9654;</button>
          <span class="time-label">
            Main sequence: <span class="TimeDemo" id="pct-ms">0</span>%
          </span>
          <input type="range" id="time-ms" min="0" max="100" value="0" class="TimeSlider" style="flex:1;">
        </div>
        
        <div style="display:flex; align-items: center; gap: 10px;">
          <button class="PlayButton" id="play-post" data-index="3" type="button">&#9654;</button>
          <span class="time-label">
            After main sequence: <span class="TimeDemo" id="pct-post">0</span>%
          </span>
          <input type="range" id="time-post" min="0" max="100" value="0" class="TimeSlider" style="flex:1;">
        </div>
      </div>
      
    </div>

    <div id="hr-diagram" class="panel">
      <h3>HR diagram</h3>
      <canvas id="diagram" width="500" height="500"></canvas>
    </div>

  </div>

  <script>
    const canvas = document.getElementById("diagram");
    const ctx = canvas.getContext("2d");
    const cssWidth = 400;
    const cssHeight = 480;
    const dpr = window.devicePixelRatio || 1;
    canvas.style.width = cssWidth + "px";
    canvas.style.height = cssHeight + "px";
    canvas.width = cssWidth * dpr;
    canvas.height = cssHeight * dpr;
    ctx.scale(dpr, dpr);

    const margin = { top: 30, right: 20, bottom: 50, left: 40 };
    const TotalWidth = cssWidth - margin.left - margin.right;
    const TotalHeight = cssHeight - margin.top - margin.bottom;
    const MagMin = -15;
    const MagMax = 20;

    const PreMSPathData = {
        "0.1": [{ T: 2700, L: 0.5 }, { T: 3100, L: 0.01 }, { T: 3350, L: 0.0035 }],
        "0.5": [{ T: 3200, L: 20 }, { T: 3800, L: 0.5 }, { T: 4600, L: 0.15 }],
        "1": [{ T: 3600, L: 80 }, { T: 4500, L: 1.5 }, { T: 5000, L: 0.5 }, { T: 5800, L: 0.3 }], 
        "3": [{ T: 4000, L: 200 }, { T: 6000, L: 15 }, { T: 10000, L: 30 }, { T: 12500, L: 55 }],
        "10": [{ T: 4500, L: 150000 }, { T: 8500, L: 2000 }, { T: 22000, L: 10000 }, { T: 32000, L: 25000 }],
        "100": [{ T: 5500, L: 4500000 }, { T: 22000, L: 800000 }, { T: 32000, L: 1500000 }]
    };

    function YAxis(Mag) {
        return margin.top + TotalHeight * (Mag - MagMin) / (MagMax - MagMin);
    }

    function TempConversion(T) {
        const logT = Math.log10(Math.max(T, 1500));
        const logMax = Math.log10(65000);
        const logMin = Math.log10(1500);
        let pct = (logMax - logT) / (logMax - logMin);
        pct = Math.max(0, Math.min(1, pct));
        return pct * TotalWidth + margin.left;
    }

    function absMagnitudeFromLuminosity(L) {
        return 4.83 - 2.5 * Math.log10(Math.max(L, 1e-10));
    }

    function getSmoothPoint(data, pct) {
        if (pct <= 0) return data[0];
        if (pct >= 1) return data[data.length - 1];
        const n = data.length - 1;
        const pos = pct * n;
        const i = Math.floor(pos);
        const t = pos - i;
        const p0 = data[Math.max(0, i - 1)];
        const p1 = data[i];
        const p2 = data[i + 1] || p1;
        const p3 = data[i + 2] || p2;
        const crm = (v0, v1, v2, v3, t) => 0.5 * ((2 * v1) + (-v0 + v2) * t + (2 * v0 - 5 * v1 + 4 * v2 - v3) * t * t + (-v0 + 3 * v1 - 3 * v2 + v3) * t * t * t);
        return {
            T: crm(p0.T, p1.T, p2.T, p3.T, t),
            L: Math.pow(10, crm(Math.log10(p0.L), Math.log10(p1.L), Math.log10(p2.L), Math.log10(p3.L), t))
        };
    }

    function drawAxes() {
        ctx.clearRect(0, 0, cssWidth, cssHeight);
        const specs = [
            { name: "O", T: 40000, color: "rgba(77, 109, 255, 0.35)" },
            { name: "B", T: 20000, color: "rgba(170, 191, 255, 0.35)" },
            { name: "A", T: 9000, color: "rgba(255, 255, 255, 0.35)" },
            { name: "F", T: 6800, color: "rgba(255, 255, 212, 0.35)" },
            { name: "G", T: 5600, color: "rgba(255, 238, 0, 0.35)" },
            { name: "K", T: 4500, color: "rgba(255, 149, 0, 0.35)" },
            { name: "M", T: 2800, color: "rgba(255, 61, 61, 0.35)" }
        ];
        const grad = ctx.createLinearGradient(margin.left, 0, margin.left + TotalWidth, 0);
        specs.forEach(s => {
            let pos = (TempConversion(s.T) - margin.left) / TotalWidth;
            grad.addColorStop(Math.max(0, Math.min(1, pos)), s.color);
        });
        ctx.fillStyle = grad; ctx.fillRect(margin.left, margin.top, TotalWidth, TotalHeight);

        ctx.textAlign = "center"; ctx.fillStyle = "#000";
        ctx.fillText("Spectral Type", margin.left + TotalWidth / 2, margin.top + TotalHeight + 40);
        ctx.save();
        ctx.translate(15, margin.top + TotalHeight / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText("Absolute Magnitude", 0, 0);
        ctx.restore();

        ctx.textBaseline = "top";
        specs.forEach(s => {
            const x = TempConversion(s.T);
            ctx.beginPath(); ctx.moveTo(x, margin.top); ctx.lineTo(x, margin.top + TotalHeight);
            ctx.strokeStyle = "rgba(200, 200, 200, 0.5)"; ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x, margin.top + TotalHeight); ctx.lineTo(x, margin.top + TotalHeight + 6);
            ctx.strokeStyle = "#000"; ctx.stroke();
            ctx.fillText(s.name, x, margin.top + TotalHeight + 10);
        });

        ctx.textAlign = "right"; ctx.textBaseline = "middle";
        for (let M = MagMin; M <= MagMax; M += 5) {
            let y = YAxis(M);
            ctx.moveTo(margin.left - 5, y); ctx.lineTo(margin.left, y); ctx.stroke();
            ctx.fillText(M, margin.left - 8, y);
            ctx.strokeStyle = "#ccc"; ctx.beginPath();
            ctx.moveTo(margin.left, y); ctx.lineTo(margin.left + TotalWidth, y); ctx.stroke();
        }

        ctx.strokeStyle = "#000"; ctx.lineWidth = 1; ctx.beginPath();
        ctx.moveTo(margin.left, margin.top + TotalHeight); ctx.lineTo(margin.left + TotalWidth, margin.top + TotalHeight);
        ctx.moveTo(margin.left, margin.top); ctx.lineTo(margin.left, margin.top + TotalHeight); ctx.stroke();

        function Labels(text, T, Mag, angle = 0) {
            ctx.save();
            ctx.translate(TempConversion(T), YAxis(Mag)); ctx.rotate(angle);
            ctx.font = "12px sans-serif"; ctx.fillStyle = "rgba(0,0,0,0.7)";
            ctx.textAlign = "center"; ctx.fillText(text, 0, 0);
            ctx.restore();
        }
        Labels("Main Sequence", 11000, 0, Math.PI / 4);
        Labels("White Dwarfs", 13000, 13);
        Labels("Giants", 3700, 0);
        Labels("Supergiants", 5000, -8);
    }

    function drawPointer(x, y, color) {
        ctx.fillStyle = color; ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 1; ctx.stroke();
    }

    function renderTrack() {
        drawAxes();
        const mKey = document.getElementById("MassValues").value;
        const pts = PreMSPathData[mKey];
        const valPre = document.getElementById("time-pre").value / 100;
        const valMS = document.getElementById("time-ms").value / 100;
        const valPost = document.getElementById("time-post").value / 100;

        let lastX, lastY;

        if (pts && valPre > 0) {
            ctx.strokeStyle = "#00008B"; ctx.lineWidth = 2; ctx.beginPath();
            const start = pts[0];
            ctx.moveTo(TempConversion(start.T), YAxis(absMagnitudeFromLuminosity(start.L)));
            const res = 150;
            for (let j = 1; j <= res * valPre; j++) {
                const p = getSmoothPoint(pts, j / res);
                lastX = TempConversion(p.T);
                lastY = YAxis(absMagnitudeFromLuminosity(p.L));
                ctx.lineTo(lastX, lastY);
            }
            ctx.stroke();
            if (valMS === 0) drawPointer(lastX, lastY, "#00008B");
        }

        if (valPre >= 1 && valMS > 0) {
            const zams = pts[pts.length - 1];
            const x0 = TempConversion(zams.T);
            const y0 = YAxis(absMagnitudeFromLuminosity(zams.L));
            const lengthScale = 100; 
            const msEndX = x0 - lengthScale * 0.15; 
            const msEndY = y0 - lengthScale * 0.15; 
            
            const currX = x0 + (msEndX - x0) * valMS; 
            const currY = y0 + (msEndY - y0) * valMS; 

            ctx.strokeStyle = "#008000"; ctx.lineWidth = 2; ctx.beginPath();
            ctx.moveTo(x0, y0);
            ctx.lineTo(currX, currY);
            ctx.stroke();
            
            lastX = currX; lastY = currY;
            if (valPost === 0) drawPointer(lastX, lastY, "#008000");

            if (valMS >= 1 && valPost > 0) {
                const m = parseFloat(mKey);
                ctx.strokeStyle = "#B22222"; ctx.lineWidth = 2; ctx.beginPath();
                ctx.moveTo(msEndX, msEndY);
                
                let px = msEndX, py = msEndY;

                if (m < 10) {
                    let targetL = 200;
                    if (m == 3) {
                      targetL = 800;
                      targetT = 3600;
                    } else if (m == 0.1) {
                      targetL = 1.1;
                      targetT = 2500;
                    } else if (m == 1) {
                      targetL = 200;
                      targetT = 3600;
                    }
                    const giantX = TempConversion(3600);
                    const giantY = YAxis(absMagnitudeFromLuminosity(targetL));
                    const farLeftX = TempConversion(40000); 
                    const wdX = TempConversion(13000);
                    const wdY = YAxis(13);

                    if (valPost <= 0.75) {
                        if (valPost <= 0.3) {
                            let pct = valPost / 0.3;
                            px = msEndX + (giantX - msEndX) * pct;
                            py = msEndY + (giantY - msEndY) * pct;
                            ctx.lineTo(px, py);
                        } else {
                            ctx.lineTo(giantX, giantY);
                            let pct = (valPost - 0.3) / (0.75 - 0.3);
                            px = giantX + (farLeftX - giantX) * pct;
                            py = giantY;
                            ctx.lineTo(px, py);
                        }
                    } else {
                        ctx.lineTo(giantX, giantY);
                        ctx.lineTo(farLeftX, giantY);
                        let pct = (valPost - 0.75) / 0.25;
                        px = farLeftX + (wdX - farLeftX) * pct;
                        py = giantY + (wdY - giantY) * pct;
                        ctx.lineTo(px, py);
                    }
                } else {
                    const sgX = TempConversion(4500); 
                    const sgY = msEndY - 25; 
                    if (valPost <= 0.75) {
                        let pct = valPost / 0.75;
                        px = msEndX + (sgX - msEndX) * pct;
                        py = msEndY + (sgY - msEndY) * pct;
                        ctx.lineTo(px, py);
                    } else {
                        ctx.lineTo(sgX, sgY);
                        px = sgX; py = sgY;
                    }
                }
                ctx.stroke();
                drawPointer(px, py, "#B22222");
            }
        }
    }

 const sPre = document.getElementById("time-pre");
    const sMS = document.getElementById("time-ms");
    const sPost = document.getElementById("time-post");

    sPre.oninput = function() {
      document.getElementById("pct-pre").innerText = this.value;
      renderTrack();
    };

    sMS.oninput = function() {
      document.getElementById("pct-ms").innerText = this.value;
      renderTrack();
    };

    sPost.oninput = function() {
      document.getElementById("pct-post").innerText = this.value;
      renderTrack();
    };

    window.renderTrack = renderTrack;
    window.addEventListener("load", renderTrack);
  </script>

  <script type="module" src="./star.js"></script>

</body>
</html>
